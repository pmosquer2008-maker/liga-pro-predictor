name: Strike Engine Automator

on:
  schedule:
    # Se ejecuta automáticamente cada 30 minutos
    - cron: '*/30 * * * *' 
  workflow_dispatch: 
    # Esto te permitirá ejecutarlo manualmente con un botón cuando quieras

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Otorga permiso al robot para subir el archivo database.db

    steps:
    - name: 📥 Clonar el Repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' 

    - name: 📦 Instalar Dependencias (Scrapers)
      # Las instalamos directamente aquí para no dañar el servidor de Streamlit
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests unidecode playwright
        playwright install chromium

    - name: 🕷️ Ejecutar Scrapers (Extrayendo datos de la web...)
      run: |
        python tournament_scraper.py
        python stake_scraper.py

    - name: 💾 Guardar y Subir Base de Datos (database.db)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add database.db
        git commit -m "🤖 Actualización automática de la BD [skip ci]" || echo "No hay cambios nuevos para subir"
        git push
